<div class="product-list-page">
  <div class="page-header">
    <h1>
      <span *ngIf="filters.search">Search: "{{ filters.search }}"</span>
      <span *ngIf="filters.category && !filters.search">{{ filters.category }}</span>
      <span *ngIf="!filters.search && !filters.category">All Products</span>
    </h1>
    <p *ngIf="pagination">{{ pagination.total }} products found</p>
  </div>

  <div class="page-content">
    <!-- Filters Sidebar -->
    <aside class="filters-sidebar" [class.open]="filtersOpen">
      <div class="filters-header">
        <h3>Filters</h3>
        <button class="close-filters" (click)="filtersOpen = false">✕</button>
      </div>

      <div class="filter-group">
        <label>Category</label>
        <select [(ngModel)]="filters.category" (change)="applyFilters()">
          <option value="">All Categories</option>
          <option *ngFor="let cat of categories" [value]="cat.name">
            {{ cat.name }} ({{ cat.count }})
          </option>
        </select>
      </div>

      <div class="filter-group">
        <label>Sort By</label>
        <select [(ngModel)]="filters.sort" (change)="applyFilters()">
          <option *ngFor="let opt of sortOptions" [value]="opt.value">{{ opt.label }}</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Min Price (₹)</label>
        <input type="number" [(ngModel)]="filters.minPrice" placeholder="0" min="0" />
      </div>

      <div class="filter-group">
        <label>Max Price (₹)</label>
        <input type="number" [(ngModel)]="filters.maxPrice" placeholder="No limit" min="0" />
      </div>

      <div class="filter-actions">
        <button class="btn-apply" (click)="applyFilters()">Apply Filters</button>
        <button class="btn-clear" (click)="clearFilters()">Clear All</button>
      </div>
    </aside>

    <!-- Products Grid -->
    <main class="products-main">
      <div class="toolbar">
        <button class="btn-toggle-filters" (click)="filtersOpen = !filtersOpen">
          ☰ Filters
        </button>
        <div class="search-bar">
          <input
            type="text"
            [(ngModel)]="filters.search"
            placeholder="Search products..."
            (keyup.enter)="applyFilters()"
          />
          <button (click)="applyFilters()">🔍</button>
        </div>
      </div>

      <app-loading-spinner *ngIf="loading"></app-loading-spinner>

      <div *ngIf="!loading && products.length === 0" class="no-results">
        <h3>No products found</h3>
        <p>Try adjusting your filters or search terms.</p>
        <button class="btn-apply" (click)="clearFilters()">Clear Filters</button>
      </div>

      <div class="products-grid" *ngIf="!loading && products.length > 0">
        <app-product-card
          *ngFor="let product of products"
          [product]="product"
        ></app-product-card>
      </div>

      <!-- Pagination -->
      <div class="pagination" *ngIf="pagination && pagination.totalPages > 1">
        <button
          [disabled]="!pagination.hasPrevPage"
          (click)="onPageChange(pagination.page - 1)"
        >
          ‹ Prev
        </button>
        <button
          *ngFor="let p of pages"
          [class.active]="p === pagination.page"
          (click)="onPageChange(p)"
        >
          {{ p }}
        </button>
        <button
          [disabled]="!pagination.hasNextPage"
          (click)="onPageChange(pagination.page + 1)"
        >
          Next ›
        </button>
      </div>
    </main>
  </div>
</div>
